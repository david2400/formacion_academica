# Spring Boot - Permitir overriding de beans para resolver conflictos (DEBE ESTAR AL PRINCIPIO)
spring.main.allow-bean-definition-overriding=true

server.port=8081

spring.application.name=formacion_academica

# MySQL datasource (Docker compose: mysql:5.7 on localhost:3306)
spring.datasource.url=jdbc:mysql://localhost:3306/academia?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=Simonsito123

# Hibernate DDL - Temporal para limpiar datos corruptos de UUID
#spring.jpa.hibernate.ddl-auto=create
spring.jpa.hibernate.ddl-auto=create-drop

# Hibernate configuración adicional
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl
spring.jpa.defer-datasource-initialization=true

# Jackson - Serialización JSON en snake_case
spring.jackson.property-naming-strategy=SNAKE_CASE
spring.jackson.mapper.accept-case-insensitive-properties=true
spring.jackson.deserialization.fail-on-unknown-properties=false

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when_authorized